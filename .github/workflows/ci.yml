name: ci

# Build + test verification on every branch / PR. Does NOT publish — releases
# go through kotlin-compose-publish.yml on a kotlin-compose-v* tag.
on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # Pure-Kotlin modules: full multiplatform build + all tests. The engine's
      # bit-exact parity tests (bucketing, k-means) and the schema round-trips
      # run on every target here.
      - name: Build schema (all targets)
        run: ./gradlew :kotlin-compose-schema:build

      - name: Build engine (all targets)
        run: ./gradlew :kotlin-engine:build

      # Runs the factor-SQL integration test against a throwaway Postgres
      # (testcontainers); Docker is available on ubuntu runners.
      - name: Build kotlin-server
        run: ./gradlew :kotlin-server:build

      # Renderer: compile every target, then run the non-UI desktop tests.
      # runComposeUiTest tests (RenderControls/RenderList/Keybinding/SpecHotSwap)
      # are excluded pending the known runComposeUiTest NPEs (#1) — they pass
      # locally but are flaky on CI; the same allowlist the publish job uses.
      - name: Assemble renderer (all targets)
        run: ./gradlew :kotlin-compose:assemble

      - name: Run renderer desktop tests (non-UI)
        run: >
          ./gradlew :kotlin-compose:desktopTest
          --tests "ai.factoredui.compose.capture.*"
          --tests "ai.factoredui.compose.renderer.RenderContextTest"
          --tests "ai.factoredui.compose.schema.ObservabilityTest"

      # Render-correctness gate: headless renderSpecToPng paths only (no
      # runComposeUiTest — these are immune to #1). The golden-pose silhouette
      # gate reds if a scene3d change shifts a body's drawn silhouette; the rest
      # guard the headless render seam (inline body_frame, bare-body, drive,
      # topology-neutral bones, intent dispatch).
      - name: Run render-correctness gate
        run: >
          ./gradlew :kotlin-compose:desktopTest
          --tests "ai.factoredui.compose.render.*"
          --tests "ai.factoredui.compose.scene3d.TopologyNeutralBonesTest"
          --tests "ai.factoredui.compose.scene3d.Scene3dIntentDispatchCheck"
          --tests "ai.factoredui.compose.scene3d.BodyFrameParseTest"
          --tests "ai.factoredui.compose.scene3d.BodyFramesToMotionClipTest"
          --tests "ai.factoredui.compose.scene3d.JointFrameDigestTest"
