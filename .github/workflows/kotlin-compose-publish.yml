name: kotlin-compose publish

on:
  push:
    tags:
      - 'kotlin-compose-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('packages/kotlin-compose/**/*.gradle*', 'packages/kotlin-compose/gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Run desktop tests
        working-directory: packages/kotlin-compose
        run: ./gradlew desktopTest

      - name: Publish to local file repo
        working-directory: packages/kotlin-compose
        run: ./gradlew publishAllPublicationsToLocalBuildRepoRepository

      - name: Deploy Maven repo to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: packages/kotlin-compose/build/maven-repo
          publish_branch: gh-pages
          destination_dir: .
          keep_files: true
          commit_message: "publish kotlin-compose from ${{ github.ref_name }}"
