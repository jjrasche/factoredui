name: kotlin-compose publish

on:
  push:
    tags:
      - 'kotlin-compose-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Run schema tests (all targets via :build)
        run: ./gradlew :kotlin-compose-schema:build

      - name: Build engine (all targets via :build)
        run: ./gradlew :kotlin-engine:build

      # Excludes RenderControlsTest pending #1 (6 pre-existing NPEs under
      # runComposeUiTest, regressed sometime after kotlin-compose-v0.8.0).
      # Remove the --tests filter once #1 lands.
      - name: Run renderer desktop tests
        run: >
          ./gradlew :kotlin-compose:desktopTest
          --tests "ai.factoredui.compose.capture.*"
          --tests "ai.factoredui.compose.renderer.RenderContextTest"
          --tests "ai.factoredui.compose.schema.ObservabilityTest"

      - name: Build renderer (all targets)
        run: ./gradlew :kotlin-compose:assemble

      - name: Build kotlin-server
        run: ./gradlew :kotlin-server:build

      - name: Publish all artifacts to local file repo
        run: >
          ./gradlew
          :kotlin-compose-schema:publishAllPublicationsToLocalBuildRepoRepository
          :kotlin-engine:publishAllPublicationsToLocalBuildRepoRepository
          :kotlin-compose:publishAllPublicationsToLocalBuildRepoRepository
          :kotlin-server:publishAllPublicationsToLocalBuildRepoRepository

      - name: Deploy Maven repo to gh-pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/maven-repo
          publish_branch: gh-pages
          destination_dir: .
          keep_files: true
          commit_message: "publish factoredui artifacts from ${{ github.ref_name }}"
